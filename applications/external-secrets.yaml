---
# ArgoCD Application for External Secrets Operator (external repo)
#
# Deploys ESO configuration, ClusterSecretStore, and sample app
# using the Kubernetes provider to simulate an external vault.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/eso-demo.git
    targetRevision: main
    path: overlays/vault
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
