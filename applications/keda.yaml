---
# ArgoCD Application for KEDA Autoscaling (external repo)
#
# Deploys the KEDA operator and supporting infrastructure
# (Kafka, PostgreSQL, RabbitMQ) for autoscaling demos.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/microservices-keda.git
    targetRevision: main
    path: infrastructure
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
