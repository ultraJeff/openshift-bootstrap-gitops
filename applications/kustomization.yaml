apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: argocd-applications

resources:
  # Platform infrastructure (in-repo)
  - storage.yaml
  - security.yaml
  - orchestrator.yaml

  # Applications with manual secret prerequisites (in-repo)
  - keycloak.yaml
  - developer-hub.yaml

  # External repos
  - observability.yaml
  - network-observability.yaml
  - external-secrets.yaml
  - rhoai.yaml
  - service-mesh.yaml
  - keda.yaml
