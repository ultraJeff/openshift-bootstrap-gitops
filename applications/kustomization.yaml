apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: argocd-applications

resources:
  # Platform infrastructure
  - storage.yaml
  - security.yaml
  - networking.yaml
  - orchestrator.yaml

  # Applications with manual secret prerequisites
  - keycloak.yaml
  - developer-hub.yaml

  # External repos
  - observability.yaml
  - observability-demos.yaml
