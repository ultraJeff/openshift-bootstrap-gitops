---
# ArgoCD Application for Network Observability (external repo)
#
# Deploys the Network Observability Operator, LokiStack, and FlowCollector.
# Uses the integrated overlay which shares MinIO and Loki Operator
# from the observability app (cluster-o11y-operator-demo).
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-observability
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/network-o11y-operator-demo.git
    targetRevision: main
    path: overlays/integrated
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
