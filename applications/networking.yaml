---
# ArgoCD Application for Network Observability
#
# Deploys MinIO, Loki Operator, LokiStack, NetObserv Operator,
# and FlowCollector for network traffic visibility.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/openshift-bootstrap-gitops.git
    targetRevision: main
    path: cluster-configs/networking
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
