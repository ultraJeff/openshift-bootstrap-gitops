---
# ArgoCD Application for Observability Demos (external repo)
#
# Deploys demo workloads (HotROD, trace generator) and their
# monitoring resources (MonitoringStack, ServiceMonitors, alerts)
# from the cluster-o11y-operator-demo repository.
#
# Requires the observability Application to be deployed first
# (operators, storage, tracing pipeline must exist).
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-demos
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/cluster-o11y-operator-demo.git
    targetRevision: main
    path: demos-deploy
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
