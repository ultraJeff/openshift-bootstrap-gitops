---
# ArgoCD Application for Red Hat OpenShift AI (external repo)
#
# Deploys DSCI, DSC, namespace, ServingRuntime, and InferenceService
# for a minimal AI/ML serving environment.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/rhoai-super-slim.git
    targetRevision: main
    path: manifests/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
