---
# ArgoCD Application for Security configurations
#
# Deploys RBAC policies, htpasswd OAuth, and admin user setup.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/openshift-bootstrap-gitops.git
    targetRevision: main
    path: cluster-configs/security
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
