---
# ArgoCD Application for OpenShift Service Mesh 3 (external repo)
#
# Deploys SM3 + Kiali operators, Istio ambient mesh configuration,
# OSSM-specific TempoStack, OTel Collector, and COO MonitoringStack.
# Uses the integrated overlay which shares Tempo/OTel/COO operators
# and MinIO from the observability app (cluster-o11y-operator-demo).
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-mesh
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/ossm-3-demo.git
    targetRevision: main
    path: deploy/overlays/integrated
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
