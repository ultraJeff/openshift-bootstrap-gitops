---
# ArgoCD Application for Storage configuration
#
# Deploys LVM Storage operator, LVMCluster, and Image Registry storage.
# Should be deployed first as other components depend on storage.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/openshift-bootstrap-gitops.git
    targetRevision: main
    path: cluster-configs/storage
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
