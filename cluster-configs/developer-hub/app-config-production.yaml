# RHDH Application Configuration - contains Backstage app-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    rhdh.redhat.com/backstage-name: developer-hub
    argocd.argoproj.io/sync-wave: "2"
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  name: app-config-rhdh
  namespace: rhdh
data:
  app-config-rhdh.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: ${BACKEND_URL}
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: argocd
              url: ${ARGOCD_URL}
              username: ${ARGOCD_USERNAME}
              password: ${ARGOCD_PASSWORD}
    signInPage: oidc
    auth:
      # Need this for OIDC Keycloak login
      session:
        secret: ${BACKEND_SECRET}
      environment: production
      providers:
        oidc:
          production:
            metadataUrl: ${KEYCLOAK_BASE_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration
            clientId: ${KEYCLOAK_CLIENT_ID}
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
        github:
          production:
            clientId: ${GITHUB_INTEGRATION_CLIENT_ID}
            clientSecret: ${GITHUB_INTEGRATION_CLIENT_SECRET}
            disableIdentityResolution: true
    backend:
      auth:
        externalAccess:
          - type: static
            options:
              token: ${BACKEND_SECRET}
              subject: external-access
      cors:
        origin: ${BACKEND_URL}
      baseUrl: ${BACKEND_URL}
      reading:
        allow:
          - host: raw.githubusercontent.com
          - host: github.com
    catalog:
      locations:
        - type: url
          target: https://raw.githubusercontent.com/ultraJeff/rhdh-software-templates/main/all.yaml
          rules:
            - allow: [Template, Group]
        - type: url
          target: https://github.com/ultraJeff/rhdh-demo-cluster/blob/main/templates/catalog-info.yaml
          rules:
            - allow: [Location, Template]
      providers:
        keycloakOrg:
          default:
            baseUrl: ${KEYCLOAK_BASE_URL}
            loginRealm: ${KEYCLOAK_REALM}
            realm: ${KEYCLOAK_REALM}
            clientId: ${KEYCLOAK_CLIENT_ID}
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            schedule:
              frequency:
                minutes: 5
              timeout:
                minutes: 3
              initialDelay:
                seconds: 15
        github:
          providerId:
            organization: "${GITHUB_INTEGRATION_ORGANIZATION}"
            schedule:
              frequency:
                minutes: 30
              initialDelay:
                seconds: 15
              timeout:
                minutes: 15
        githubOrg:
          id: githubOrg
          githubUrl: "https://github.com"
          orgs:
            - ${GITHUB_INTEGRATION_ORGANIZATION}
          schedule:
            frequency:
              minutes: 30
            initialDelay:
              seconds: 15
            timeout:
              minutes: 15
    integrations:
      github:
        - host: ${GITHUB_INTEGRATION_HOST_DOMAIN}
          token: ${GITHUB_PAT}
          apps:
            - appId: ${GITHUB_INTEGRATION_APP_ID}
              clientId: ${GITHUB_INTEGRATION_CLIENT_ID}
              clientSecret: ${GITHUB_INTEGRATION_CLIENT_SECRET}
              privateKey: |
                ${GITHUB_INTEGRATION_PRIVATE_KEY_FILE}
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: local
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true
      customResources:
        - group: tekton.dev
          apiVersion: v1
          plural: pipelineruns
        - group: tekton.dev
          apiVersion: v1
          plural: taskruns
    quay:
      uiUrl: https://quay.io
    scaffolder:
      defaultEnvironment:
        secrets:
          AAP_TOKEN: ${AAP_TOKEN}
    ansible:
      creatorService:
        baseUrl: 127.0.0.1
        port: '8000'
      rhaap:
        baseUrl: ${AAP_BASE_URL}
        token: ${AAP_TOKEN}
        checkSSL: false
    proxy:
      endpoints:
        '/quay/api':
          target: https://quay.io
          headers:
            X-Requested-With: XMLHttpRequest
          changeOrigin: true
          secure: true
    orchestrator:
      dataIndexService:
        url: http://sonataflow-platform-data-index-service.sonataflow-infra
      sonataflow:
        baseUrl: http://sonataflow-platform-data-index-service.sonataflow-infra
    extensions:
      installation:
        enabled: true
        saveToSingleFile:
          file: /opt/app-root/src/dynamic-plugins-root/installed-dynamic-plugins.yaml
    permission:
      enabled: true
      rbac:
        policies-csv-file: /opt/app-root/src/rbac-policies.csv
        policyFileReload: true
        admin:
          users:
            - name: user:default/admin
        pluginsWithPermission:
          - catalog
          - scaffolder
          - permission
          - orchestrator
