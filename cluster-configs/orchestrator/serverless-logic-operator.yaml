# OpenShift Serverless Logic Operator - required for Orchestrator workflows
# This provides the SonataFlow workflow engine for the Orchestrator plugin
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-serverless-logic
  labels:
    name: openshift-serverless-logic
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: logic-operator-group
  namespace: openshift-serverless-logic
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: logic-operator-rhel8
  namespace: openshift-serverless-logic
spec:
  channel: alpha
  name: logic-operator-rhel8
  source: redhat-operators
  sourceNamespace: openshift-marketplace
